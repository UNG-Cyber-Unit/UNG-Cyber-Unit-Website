name = "ung-cyber-unit-website"
main = "worker.js"
compatibility_date = "2024-01-01"

[assets]
directory = "./public"
binding = "ASSETS"
# Route the HTML pages through the worker so they all get the security headers
# (CSP, X-Frame-Options, etc.); static files would otherwise bypass them. Only
# the pages are listed — CSS/JS/images stay served directly by the asset layer
# (correct MIME, edge-fast). The "/" branch also server-renders the topic grid.
run_worker_first = [ "/", "/start", "/about", "/resources", "/admin", "/instructor", "/profile", "/quiz" ]

[[d1_databases]]
binding      = "DB"
database_name = "cyber-unit-db"
database_id  = "30fcf0cc-9912-430e-a8d2-54b9dec9ba1a"

# Hourly cleanup of expired room-code rate-limit rows (see scheduled() in worker.js)
[triggers]
crons = ["0 * * * *"]
