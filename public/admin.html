<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>CyberUnit @ UNG — Admin</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- ─── Navbar ──────────────────────────────────────────── -->
  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="container">
      <a href="/" class="navbar-logo"><img src="/images/CyberUnitLogo_Transparent.png" alt="CyberUnit @ UNG" class="navbar-logo-img"><span class="navbar-logo-text">[ CyberUnit @ UNG ]</span></a>
      <button class="hamburger" id="hamburger" aria-label="Toggle navigation" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <ul class="navbar-links" id="navLinks">
        <li><a href="/">Home</a></li>
        <li><a href="/resources">Resources</a></li>
        <li><a href="/about">About</a></li>
        <li id="authNavItem"></li>
      </ul>
    </div>
  </nav>

  <main class="page-body">
    <div class="container" style="max-width: 900px; padding: 2rem 1rem;">

      <header style="margin-bottom: 2rem;">
        <h1 style="font-family: 'Share Tech Mono', monospace; color: var(--accent); font-size: 1.6rem; margin: 0 0 0.25rem;">
          // Admin Panel
        </h1>
        <p style="color: var(--text-muted); font-family: 'Share Tech Mono', monospace; font-size: 0.85rem; margin: 0;">
          User management — admin only
        </p>
      </header>

      <!-- Search -->
      <div class="form-group" style="margin-bottom: 1.25rem; max-width: 320px;">
        <label for="userSearch">Search users</label>
        <input
          id="userSearch"
          type="search"
          placeholder="Search by username..."
          aria-label="Search users"
        >
      </div>

      <!-- User table -->
      <div id="adminTableWrap">
        <p style="color: var(--text-muted); font-family: 'Share Tech Mono', monospace;">Loading users...</p>
      </div>

    </div>
  </main>

  <script src="/js/main.js"></script>
</body>
</html>
