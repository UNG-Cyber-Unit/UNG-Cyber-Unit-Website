<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberUnit @ UNG — Quiz Room</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- ─── Navbar ──────────────────────────────────────────── -->
  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="container">
      <a href="/" class="navbar-logo"><img src="/images/CyberUnitLogo_Transparent.png" alt="CyberUnit @ UNG" class="navbar-logo-img"><span class="navbar-logo-text">[ CyberUnit @ UNG ]</span></a>
      <button class="hamburger" id="hamburger" aria-label="Toggle navigation" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <ul class="navbar-links" id="navLinks">
        <li><a href="/">Home</a></li>
        <li><a href="/resources">Resources</a></li>
        <li><a href="/about">About</a></li>
        <li id="authNavItem"></li>
      </ul>
    </div>
  </nav>

  <main class="page-body">
    <div class="quiz-entry-container">
      <div class="quiz-entry-card">
        <h1 class="quiz-entry-title">// Quiz Room</h1>
        <p class="quiz-entry-subtitle">Enter your room code to begin</p>

        <form id="quizEntryForm" novalidate>
          <div class="quiz-entry-input-wrap">
            <input
              type="text"
              id="roomCodeInput"
              class="quiz-entry-input"
              placeholder="XXXX-XXXX"
              maxlength="9"
              autocomplete="off"
              autocapitalize="characters"
              spellcheck="false"
              aria-label="Room code">
            <button type="submit" class="btn btn-primary">Enter Room</button>
          </div>
          <p class="form-error" id="quizEntryError" aria-live="polite" hidden></p>
        </form>

        <p class="quiz-entry-hint">Ask your instructor for the room code</p>
      </div>
    </div>
  </main>

  <script src="/js/main.js"></script>
</body>
</html>
