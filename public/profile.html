<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>CyberUnit @ UNG — Profile</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- ─── Navbar ──────────────────────────────────────────── -->
  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="container">
      <a href="/" class="navbar-logo"><img src="/images/CyberUnitLogo_Transparent.png" alt="CyberUnit @ UNG" class="navbar-logo-img"><span class="navbar-logo-text">[ CyberUnit @ UNG ]</span></a>
      <button class="hamburger" id="hamburger" aria-label="Toggle navigation" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <ul class="navbar-links" id="navLinks">
        <li><a href="/">Home</a></li>
        <li><a href="/resources">Resources</a></li>
        <li><a href="/about">About</a></li>
        <li id="authNavItem"></li>
      </ul>
    </div>
  </nav>

  <main class="page-body">
    <div class="container" style="max-width: 960px; padding: 2rem 1rem;">

      <header style="margin-bottom: 2rem; text-align: center;">
        <h1 id="profileName" class="profile-name">Profile</h1>
        <p style="color: var(--text-muted); font-family: 'Share Tech Mono', monospace; font-size: 0.85rem; margin: 0.4rem 0 0;">
          Your account and quiz history
        </p>
      </header>

      <!-- Shown when not signed in -->
      <div id="loginGate" class="login-gate" hidden>
        <p style="font-size:2rem;margin-bottom:0.75rem;">🔒</p>
        <p style="margin-bottom:1.25rem;">Sign in to view your profile.</p>
        <button class="btn btn-primary" id="loginGateBtn">Sign In</button>
      </div>

      <!-- Shown when signed in -->
      <div id="profileContent" hidden>

        <!-- ─── Account ────────────────────────────────────── -->
        <section class="instructor-section">
          <h2 class="instructor-section-heading">// Account</h2>
          <div id="accountWrap">
            <p style="color: var(--text-muted); font-family: 'Share Tech Mono', monospace;">Loading...</p>
          </div>
        </section>

        <!-- ─── Pathway Badges ─────────────────────────────── -->
        <section class="instructor-section">
          <h2 class="instructor-section-heading">// Pathway Badges</h2>
          <div id="badgesWrap">
            <p style="color: var(--text-muted); font-family: 'Share Tech Mono', monospace;">Loading...</p>
          </div>
        </section>

        <!-- ─── Topic Progress ─────────────────────────────── -->
        <section class="instructor-section">
          <h2 class="instructor-section-heading">// Topic Quiz Progress</h2>
          <div id="progressWrap">
            <p style="color: var(--text-muted); font-family: 'Share Tech Mono', monospace;">Loading...</p>
          </div>
        </section>

        <!-- ─── Quiz Room History ──────────────────────────── -->
        <section class="instructor-section">
          <h2 class="instructor-section-heading">// Quiz Room History</h2>
          <div id="roomHistoryWrap">
            <p style="color: var(--text-muted); font-family: 'Share Tech Mono', monospace;">Loading...</p>
          </div>
        </section>

      </div>

    </div>
  </main>

  <script src="/js/main.js"></script>
</body>
</html>
